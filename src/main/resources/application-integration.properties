# ==================== SECURITY & ENCRYPTION ====================
# IMPORTANT: Set these via environment variables in production (.env file)
encryption.secret-key=${ENCRYPTION_SECRET_KEY:change-this-in-production}
encryption.algorithm=AES

# ==================== CACHE CONFIGURATION ====================
cache.ttl-minutes=${CACHE_TTL:5}
spring.cache.type=simple

# ==================== JIRA INTEGRATION ====================
jira.api.version=3
jira.base-url=${JIRA_BASE_URL:}
jira.api-token=${JIRA_API_TOKEN:}
jira.username=${JIRA_USERNAME:}

# ==================== INTEGRATION AUDIT ====================
integration.audit.retention-days=30
integration.audit.enabled=true

# ==================== API DOCUMENTATION ====================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.operations-sorter=method

# ==================== CORS CONFIGURATION ====================
# IMPORTANT: Update allowed-origins for your server URL in production
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# ==================== HTTP ENCODING ====================
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# ==================== JSON SERIALIZATION ====================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.locale=en_US
spring.jackson.default-property-inclusion=non_null

# ==================== SESSION MANAGEMENT ====================
server.servlet.session.timeout=30m
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.http-only=true
