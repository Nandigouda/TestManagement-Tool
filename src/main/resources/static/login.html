<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI-TestManagement Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            margin: 0 20px;
        }

        .login-card {
            background: white;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
            color: white;
            padding: 24px;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .login-header-subtitle {
            font-size: 12px;
            font-weight: 300;
            margin-top: 4px;
            opacity: 0.9;
        }

        .login-body {
            padding: 32px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 500;
            color: #333;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 3px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #2196F3;
            box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, box-shadow 0.3s;
            margin-top: 8px;
        }

        .btn-login:hover:not(:disabled) {
            background: #1976D2;
            box-shadow: 0 2px 4px rgba(33, 150, 243, 0.3);
        }

        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .toggle-form {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #666;
        }

        .toggle-form a {
            color: #2196F3;
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
        }

        .toggle-form a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px;
            margin-bottom: 16px;
            border-radius: 3px;
            font-size: 13px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }

        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .signup-fields {
            display: none;
        }

        .signup-fields.show {
            display: block;
        }

        .login-fields.hide {
            display: none;
        }

        .form-group-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 480px) {
            .form-group-row {
                grid-template-columns: 1fr;
            }
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            font-size: 12px;
            color: #999;
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #666;
            font-size: 18px;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover {
            color: #2196F3;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                AI-TestManagement Tool
                <div class="login-header-subtitle">Test Case Management Platform</div>
            </div>

            <!-- Body -->
            <div class="login-body">
                <!-- Login Form -->
                <div id="loginForm" class="login-fields">
                    <div id="loginError" class="alert alert-error"></div>

                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" id="loginUsername" class="form-input" placeholder="Enter your username" autocomplete="username">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" autocomplete="current-password">
                            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('loginPassword')">👁️</button>
                        </div>
                    </div>

                    <button class="btn-login" id="loginBtn" onclick="handleLogin()">Login</button>

                    <div class="divider">OR</div>

                    <div class="toggle-form">
                        Don't have an account? <a onclick="toggleForms()">Sign up here</a>
                    </div>
                </div>

                <!-- Signup Form -->
                <div id="signupForm" class="signup-fields">
                    <div id="signupError" class="alert alert-error"></div>
                    <div id="signupSuccess" class="alert alert-success"></div>

                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" id="signupUsername" class="form-input" placeholder="Choose username" autocomplete="username">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="signupPassword" class="form-input" placeholder="Minimum 6 characters" autocomplete="new-password">
                            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('signupPassword')">👁️</button>
                        </div>
                    </div>

                    <button class="btn-login" id="signupBtn" onclick="handleSignup()">Sign Up</button>

                    <div class="toggle-form">
                        Already have an account? <a onclick="toggleForms()">Login here</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/testmanagement/auth';

        // Check if user is already authenticated on page load
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const response = await fetch('/testmanagement/auth/status', {
                    method: 'GET',
                    credentials: 'same-origin'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.authenticated) {
                        // User is already logged in, redirect to home
                        window.location.href = '/testmanagement/index.html';
                    }
                }
            } catch (error) {
                console.log('Auth check error:', error);
                // Continue showing login page
            }
        });

        function toggleForms() {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const loginError = document.getElementById('loginError');
            const signupError = document.getElementById('signupError');
            const signupSuccess = document.getElementById('signupSuccess');

            loginForm.classList.toggle('hide');
            signupForm.classList.toggle('show');

            loginError.classList.remove('show');
            signupError.classList.remove('show');
            signupSuccess.classList.remove('show');

            // Clear inputs
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');

            if (!username || !password) {
                showError(loginError, 'Please enter both username and password');
                return;
            }

            loginBtn.disabled = true;
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<span class="spinner"></span>';

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    loginError.classList.remove('show');
                    // Redirect to main application
                    window.location.href = '/testmanagement/index.html';
                } else {
                    showError(loginError, data.message || 'Login failed');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError(loginError, 'Connection error. Please try again.');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = originalText;
            }
        }

        async function handleSignup() {
            const username = document.getElementById('signupUsername').value.trim();
            const password = document.getElementById('signupPassword').value;
            const signupBtn = document.getElementById('signupBtn');
            const signupError = document.getElementById('signupError');
            const signupSuccess = document.getElementById('signupSuccess');

            // Validation
            if (!username || !password) {
                showError(signupError, 'Please enter both username and password');
                return;
            }

            if (password.length < 6) {
                showError(signupError, 'Password must be at least 6 characters');
                return;
            }

            signupBtn.disabled = true;
            const originalText = signupBtn.innerHTML;
            signupBtn.innerHTML = '<span class="spinner"></span>';

            try {
                const response = await fetch(`${API_BASE}/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    signupError.classList.remove('show');
                    signupSuccess.classList.add('show');
                    signupSuccess.textContent = '✓ Account created successfully! Redirecting to login...';

                    // Clear form
                    document.getElementById('signupUsername').value = '';
                    document.getElementById('signupPassword').value = '';

                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        toggleForms();
                    }, 2000);
                } else {
                    signupSuccess.classList.remove('show');
                    showError(signupError, data.message || 'Signup failed');
                }
            } catch (error) {
                console.error('Signup error:', error);
                signupSuccess.classList.remove('show');
                showError(signupError, 'Connection error. Please try again.');
            } finally {
                signupBtn.disabled = false;
                signupBtn.innerHTML = originalText;
            }
        }

        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            const button = event.currentTarget;
            if (input.type === 'password') {
                input.type = 'text';
                button.textContent = '🙈';
            } else {
                input.type = 'password';
                button.textContent = '👁️';
            }
        }

        function showError(element, message) {
            element.textContent = message;
            element.classList.add('show');
        }

        // Allow Enter key to submit
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loginPassword').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleLogin();
            });

            document.getElementById('signupPassword').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSignup();
            });
        });
    </script>
</body>
</html>
