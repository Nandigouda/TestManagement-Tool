# application.properties packaged into the WAR
# Edit these values or override them at runtime via environment variables
# or JVM args. The placeholders below use environment variables with
# defaults (H2 in-memory) so the app runs immediately if no overrides
# are provided.

# Server
server.servlet.context-path=/
spring.main.banner-mode=off
logging.level.root=INFO

# Datasource configuration (override via env or JVM args)
# Examples of environment variables that will be used if present:
#   DB_URL, DB_USERNAME, DB_PASSWORD
# Or use the SPRING_DATASOURCE_* names directly.
spring.datasource.url=${DB_URL:${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}}
spring.datasource.username=${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:sa}}
spring.datasource.password=${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
# Optional: driver class name (let Spring auto-detect for common DBs)
# spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:}

# JPA / Hibernate (example; adjust as needed)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
