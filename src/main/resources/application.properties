# Spring DotEnv Configuration
spring.config.import=optional:file:.env[.properties]

# ==================== SERVER CONFIGURATION ====================
# Server Port (change for different ports on your server)
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

# ==================== DATABASE CONFIGURATION ====================
# Update these when deploying to server - use environment variables or .env file
DB_HOST=${DB_HOST:localhost}
DB_PORT=${DB_PORT:5432}
DB_NAME=${DB_NAME:pgvector}
DB_USER=${DB_USER:postgres}
DB_PASSWORD=${DB_PASSWORD:bdadmin}

# Spring DataSource Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.auto-commit=true

# ==================== JPA/HIBERNATE CONFIGURATION ====================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ==================== LOGGING CONFIGURATION ====================
logging.level.root=INFO
logging.level.com.qaautomation=DEBUG
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=30

# ==================== APPLICATION CONFIGURATION ====================
spring.application.name=ai-testmanagement-tool
spring.profiles.active=${SPRING_PROFILE:dev}
